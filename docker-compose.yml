version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  mcp-net:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  sqlite-data:

services:

  # ── MCP Server (FastAPI) ───────────────────────────────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    ports:
      - "8003:8003"
    environment:
      - DEMO_MODE=true
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - sqlite-data:/app/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    # NOT IMPLEMENTED YET — Dockerfile.server added at Phase 6

  # ── LangGraph Agent ───────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    environment:
      - DEMO_MODE=true
      - MCP_SERVER_URL=http://mcp-server:8003
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-net
    # NOT IMPLEMENTED YET — Dockerfile.agent added at Phase 6