version: "3.9"

networks:
  mcp-net:
    driver: bridge

volumes:
  sqlite-data:

services:

  mcp-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    ports:
      - "8003:8003"
    environment:
      - DEMO_MODE=true
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-minimum-32-chars-long-change-this}
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8003/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    environment:
      - DEMO_MODE=true
      - MCP_SERVER_URL=http://mcp-server:8003
      - GROQ_API_KEY=${GROQ_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-minimum-32-chars-long-change-this}
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-net