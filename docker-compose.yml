version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: mcp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    container_name: mcp_server
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: deploy/Dockerfile.agent
    container_name: mcp_agent
    restart: unless-stopped
    env_file: .env
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      MCP_SERVER_BASE_URL: http://mcp-server:8000

volumes:
  postgres_data:

networks:
  default:
    name: mcp_network