name: Integration Tests — Live MCP Server

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed database
        run: |
          python -c "
          import sqlite3, pathlib
          conn = sqlite3.connect('data/enterprise.db')
          conn.executescript(pathlib.Path('data/seed.sql').read_text())
          conn.commit()
          conn.close()
          "

      - name: Start MCP server in background
        env:
          JWT_SECRET: local-dev-secret-minimum-32-chars-long-change-this
          DEMO_MODE: "true"
        run: |
          uvicorn mcp_server.main:app --host 0.0.0.0 --port 8003 &
          sleep 5
          curl -f http://localhost:8003/health || exit 1

      - name: Run integration tests
        env:
          JWT_SECRET: local-dev-secret-minimum-32-chars-long-change-this
          MCP_SERVER_URL: http://localhost:8003
        run: pytest tests/integration/ -v --tb=short